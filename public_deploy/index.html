<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Quantum Pi Forge</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Ethers.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.10.0/dist/ethers.umd.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0a0a0a;
      color: #00ffcc;
      text-align: center;
      padding-top: 10%;
    }

    button {
      padding: 15px 25px;
      font-size: 16px;
      background: #00ffcc;
      color: #000;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    #status {
      margin-top: 20px;
      font-size: 14px;
      color: #aaa;
    }
  </style>
</head>
<body>

  <h1>Quantum Pi Forge</h1>
  <p>Initialize Soul Connection</p>

  <button onclick="connectWallet()">Connect Wallet</button>

  <div id="status">Awaiting signal...</div>

  <script>
    const TARGET_CHAIN_ID = "0x4115"; // 0G Aristotle Mainnet
    const OINIO_CONTRACT = "0x000000000000000000000000000000000000dEaD"; // Replace with actual contract
    const OINIO_ABI = [
      "function balanceOf(address owner) view returns (uint256)",
      "function decimals() view returns (uint8)",
      "function heartbeat() external"
    ];

    let currentProvider = null;
    let currentAddress = null;

    // ✅ Bulletproof Mirror Read Logic
    async function syncMirror(provider, address, network) {
        const statusEl = document.getElementById("status");
        
        // 1. Strict Chain ID Validation
        const currentChainId = Number(network.chainId);
        const targetChainId = parseInt(TARGET_CHAIN_ID, 16);

        if (currentChainId !== targetChainId) {
            statusEl.innerHTML = `⚠️ Wrong Network (Detected ID: ${currentChainId})<br>
                                  <button onclick="switchNetwork()">Switch to 0G Aristotle</button>`;
            return null;
        }

        try {
            const contract = new ethers.Contract(OINIO_CONTRACT, OINIO_ABI, provider);
            
            // 2. Parallelize Reads for Speed
            const [balanceWei, balanceOINIO, decimals] = await Promise.all([
                provider.getBalance(address),
                contract.balanceOf(address).catch(() => 0),
                contract.decimals?.().catch(() => 18) // Safe fallback to 18
            ]);

            // 3. Robust Number Formatting
            const safe0G = Number(ethers.formatEther(balanceWei) || 0).toFixed(4);
            const safeOINIO = Number(ethers.formatUnits(balanceOINIO, decimals) || 0).toFixed(2);
            
            return { safe0G, safeOINIO };
        } catch (err) {
            console.error("Mirror Sync Error:", err);
            throw new Error("Chain read failed. Check RPC connection.");
        }
    }

    // 💓 Identity Ping Heartbeat - Intent Simulation Layer
    async function initiateHeartbeat() {
      const statusEl = document.getElementById("status");
      
      if (!currentProvider || !currentAddress) {
        statusEl.innerText = "⚠️ Connect wallet first";
        return;
      }

      try {
        statusEl.innerText = "⏳ Pre-flight simulation...";
        const contract = new ethers.Contract(OINIO_CONTRACT, OINIO_ABI, currentProvider);
        const signer = await currentProvider.getSigner();
        
        // 🔮 Intent Simulation (Pre-flight check)
        try {
          await contract.heartbeat.staticCall();
          const gasEstimate = await contract.heartbeat.estimateGas();
          const gasCost = ethers.formatEther(gasEstimate * 1000000000n); // Approx GWEI
          
          statusEl.innerHTML = `
            ✅ Heartbeat Validated<br>
            Estimated Gas: <b>${Number(gasCost).toFixed(6)} 0G</b><br><br>
            <button onclick="sendHeartbeat()">✅ Transmit Heartbeat</button>
            <button onclick="connectWallet()">❌ Cancel</button>
          `;
        } catch (simErr) {
          statusEl.innerText = `❌ Heartbeat rejected: Cooldown active or invalid state`;
          console.error("Simulation failed:", simErr);
        }
        
      } catch (err) {
        console.error(err);
        statusEl.innerText = "⚠️ Simulation failed";
      }
    }

    async function sendHeartbeat() {
      const statusEl = document.getElementById("status");
      
      try {
        statusEl.innerText = "⏳ Transmitting Heartbeat...";
        const contract = new ethers.Contract(OINIO_CONTRACT, OINIO_ABI, currentProvider);
        const signer = await currentProvider.getSigner();
        const contractWithSigner = contract.connect(signer);
        
        const tx = await contractWithSigner.heartbeat();
        statusEl.innerText = `⏳ Pending transaction: ${tx.hash.slice(0, 10)}...`;
        
        await tx.wait();
        
        statusEl.innerHTML = `
          ✅ <b>Heartbeat Confirmed</b><br>
          Soul Signal transmitted at block<br>
          Transaction: <code>${tx.hash}</code><br><br>
          <button onclick="initiateHeartbeat()">🔄 Send Another</button>
        `;
        
      } catch (err) {
        console.error(err);
        statusEl.innerText = "⚠️ Heartbeat failed";
      }
    }

    async function connectWallet() {
      const statusEl = document.getElementById("status");
      if (!window.ethereum) {
        statusEl.innerText = "❌ No wallet detected";
        return;
      }

      try {
        statusEl.innerText = "⏳ Reading from 0G Aristotle...";
        const provider = new ethers.BrowserProvider(window.ethereum);
        const accounts = await provider.send("eth_requestAccounts", []);
        const address = accounts[0];
        const network = await provider.getNetwork();

        currentProvider = provider;
        currentAddress = address;

        const balances = await syncMirror(provider, address, network);
        if (!balances) return;

        const shortAddr = address.slice(0, 6) + "..." + address.slice(-4);

        statusEl.innerHTML = `
          ✅ <b>Status: Connected</b><br>
          Address: <code>${shortAddr}</code><br>
          Balance: <b>${balances.safe0G} 0G</b><br>
          OINIO: <b>${balances.safeOINIO}</b><br><br>
          <button onclick="initiateHeartbeat()">💓 Initiate Heartbeat</button>
        `;

      } catch (err) {
        console.error(err);
        statusEl.innerText = "⚠️ Handshake failed";
      }
    }

    async function switchNetwork() {
      try {
        await window.ethereum.request({
          method: "wallet_addEthereumChain",
          params: [{
            chainId: TARGET_CHAIN_ID,
            chainName: "0G-Aristotle",
            nativeCurrency: { name: "0G", symbol: "0G", decimals: 18 },
            rpcUrls: ["https://evmrpc.0g.ai"],
            blockExplorerUrls: ["https://chainscan.0g.ai"]
          }]
        });
        connectWallet();
      } catch (err) {
        console.error(err);
        alert("Manual network switch required for 0G Aristotle.");
      }
    }
  </script>

</body>
</html>
