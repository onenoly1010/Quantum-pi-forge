<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Pi Forge Guardian Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.4/dist/ethers.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #050505; 
            color: #e0e0e0; 
            font-family: system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            padding: 2rem;
        }
        .container { max-width: 600px; margin: 0 auto; }
        .card {
            background: #0a0a0a;
            border: 1px solid #222;
            border-radius: 8px;
            padding: 2rem;
            margin: 1rem 0;
        }
        h1 { 
            font-size: 1.5rem; 
            font-weight: 500;
            margin-bottom: 1.5rem;
            color: #fff;
        }
        .count {
            font-size: 3rem;
            font-weight: 700;
            color: #8b5cf6;
            text-align: center;
            margin: 1rem 0;
        }
        .label { 
            color: #666; 
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        button {
            width: 100%;
            padding: 1rem;
            background: #8b5cf6;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 1rem;
        }
        button:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
        }
        .guardian-list {
            margin-top: 1.5rem;
            display: grid;
            gap: 0.5rem;
        }
        .guardian {
            padding: 0.75rem;
            background: #111;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.875rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .pending { opacity: 0.6; }
        .status {
            font-size: 0.75rem;
            color: #22c55e;
        }
        .status.pending { color: #eab308; }
        .sync-indicator {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
        }
        .sync-indicator.syncing {
            animation: pulse 1s infinite;
            background: #eab308;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .error {
            background: #7f1d1d;
            border-color: #b91c1c;
            color: #fca5a5;
            padding: 1rem;
            border-radius: 6px;
            margin-top: 1rem;
            display: none;
        }
        .error.visible { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="label">Guardian Count</div>
            <div id="guardianCount" class="count">0</div>
            
            <button id="registerBtn">Connect Wallet</button>
            
            <div id="errorMsg" class="error"></div>
            
            <div class="guardian-list" id="guardianList"></div>
        </div>
    </div>
    
    <div id="syncIndicator" class="sync-indicator"></div>

    <script>
        const FORGE_CONFIG = {
            address: "0x0000000000000000000000000000000000000000",
            deploymentBlock: 0,
            chainId: 137
        };

        let provider = null;
        let signer = null;
        let contract = null;
        let currentAccount = null;
        let lastScannedBlock = FORGE_CONFIG.deploymentBlock;
        const confirmedGuardians = new Map();
        const optimisticGuardians = new Map();
        let isSyncing = false;

        const ABI = [
            "event GuardianActivated(address indexed guardian, uint256 timestamp)",
            "function isGuardian(address) view returns (bool)",
            "function totalGuardians() view returns (uint256)",
            "function register() external"
        ];

        // LocalStorage Persistence
        function saveOptimistic() {
            const serialized = Array.from(optimisticGuardians.entries());
            localStorage.setItem('optimisticGuardians', JSON.stringify(serialized));
        }

        function loadOptimistic() {
            try {
                const stored = localStorage.getItem('optimisticGuardians');
                if (stored) {
                    const entries = JSON.parse(stored);
                    entries.forEach(([addr, ts]) => optimisticGuardians.set(addr, ts));
                }
            } catch(e) {
                console.warn("Failed to load optimistic state", e);
            }
        }

        function saveCursor() {
            localStorage.setItem('lastScannedBlock', lastScannedBlock.toString());
        }

        function loadCursor() {
            const stored = localStorage.getItem('lastScannedBlock');
            if (stored) {
                lastScannedBlock = parseInt(stored, 10);
            }
        }

        // Zero address guard
        function isContractConfigured() {
            return FORGE_CONFIG.address !== "0x0000000000000000000000000000000000000000";
        }

        async function syncForgeState() {
            if (!isContractConfigured()) {
                console.error("Contract not configured");
                return;
            }
            
            if (isSyncing) return;
            isSyncing = true;
            
            document.getElementById('syncIndicator').classList.add('syncing');
            
            try {
                const currentBlock = await provider.getBlockNumber();
                const toBlock = currentBlock - 5; // Reorg buffer
                
                if (toBlock > lastScannedBlock) {
                    const logs = await provider.getLogs({
                        address: FORGE_CONFIG.address,
                        topics: [ethers.id("GuardianActivated(address,uint256)")],
                        fromBlock: lastScannedBlock + 1,
                        toBlock: toBlock
                    });
                    
                    logs.forEach(log => {
                        const addr = ethers.getAddress(ethers.dataSlice(log.topics[1], 12)).toLowerCase();
                        confirmedGuardians.set(addr, log.blockNumber);
                        
                        // Chain truth overrides optimism
                        if (optimisticGuardians.has(addr.toLowerCase())) {
                            optimisticGuardians.delete(addr.toLowerCase());
                            saveOptimistic();
                        }
                    });
                    
                    lastScannedBlock = toBlock;
                    saveCursor();
                }
                
                updateUI();
                
            } catch (e) {
                console.error("Sync failed", e);
            } finally {
                isSyncing = false;
                document.getElementById('syncIndicator').classList.remove('syncing');
            }
        }

        async function registerAsGuardian() {
            const btn = document.getElementById('registerBtn');
            const errorEl = document.getElementById('errorMsg');
            
            errorEl.classList.remove('visible');
            
            if (!isContractConfigured()) {
                errorEl.textContent = "Contract not configured";
                errorEl.classList.add('visible');
                return;
            }
            
            try {
                btn.disabled = true;
                btn.textContent = "Registering...";
                
                const tx = await contract.connect(signer).register();
                
                // Optimistic update
                optimisticGuardians.set(currentAccount.toLowerCase(), Date.now());
                saveOptimistic();
                updateUI();
                
                btn.textContent = "Waiting for confirmation...";
                
                await tx.wait(1);
                
                // Re-enable button after success
                btn.disabled = false;
                
                // Check if user is now guardian
                const isGuard = await contract.isGuardian(currentAccount);
                if (isGuard) {
                    btn.textContent = "✓ You are a Guardian";
                    btn.disabled = true;
                } else {
                    btn.textContent = "Register as Guardian";
                }
                
                await syncForgeState();
                
            } catch (e) {
                console.error("Registration failed", e);
                errorEl.textContent = e.message || "Transaction failed";
                errorEl.classList.add('visible');
                
                // Re-enable button on error
                btn.disabled = false;
                btn.textContent = "Register as Guardian";
                
                // Rollback optimistic state
                if (optimisticGuardians.has(currentAccount.toLowerCase())) {
                    optimisticGuardians.delete(currentAccount.toLowerCase());
                    saveOptimistic();
                    updateUI();
                }
            }
        }

        function updateUI() {
            // Merge confirmed + optimistic (deduplicated)
            const allGuardians = new Map(confirmedGuardians);
            for (const [addr, ts] of optimisticGuardians) {
                if (!allGuardians.has(addr)) {
                    allGuardians.set(addr, ts);
                }
            }
            
            document.getElementById('guardianCount').textContent = allGuardians.size;
            
            const listEl = document.getElementById('guardianList');
            listEl.innerHTML = '';
            
            Array.from(allGuardians.entries()).sort((a,b) => a[1] - b[1]).forEach(([addr, ts]) => {
                const isPending = optimisticGuardians.has(addr);
                const item = document.createElement('div');
                item.className = `guardian ${isPending ? 'pending' : ''}`;
                item.innerHTML = `
                    <span>${addr.slice(0, 6)}...${addr.slice(-4)}</span>
                    <span class="status ${isPending ? 'pending' : ''}">${isPending ? '⏳ Pending' : '✓ Confirmed'}</span>
                `;
                listEl.appendChild(item);
            });
            
            // Update button state
            if (currentAccount) {
                const btn = document.getElementById('registerBtn');
                if (confirmedGuardians.has(currentAccount.toLowerCase())) {
                    btn.textContent = "✓ You are a Guardian";
                    btn.disabled = true;
                } else if (optimisticGuardians.has(currentAccount.toLowerCase())) {
                    btn.textContent = "⏳ Pending Confirmation";
                    btn.disabled = true;
                }
            }
        }

        async function connectWallet() {
            const btn = document.getElementById('registerBtn');
            
            try {
                if (!window.ethereum) {
                    const errorEl = document.getElementById('errorMsg');
                    errorEl.textContent = "MetaMask or Web3 wallet is required to register as Guardian";
                    errorEl.classList.add('visible');
                    btn.disabled = false;
                    btn.textContent = "Connect Wallet";
                    return;
                }
                
                btn.disabled = true;
                btn.textContent = "Connecting...";
                
                await window.ethereum.request({ method: 'eth_requestAccounts' });
                
                provider = new ethers.BrowserProvider(window.ethereum);
                const network = await provider.getNetwork();
                if (network.chainId !== 16661n) {
                    const errorEl = document.getElementById('errorMsg');
                    errorEl.textContent = "Please switch to 0G Aristotle Mainnet (chainId 16661)";
                    errorEl.classList.add('visible');
                    btn.disabled = false;
                    btn.textContent = "Connect Wallet";
                    return;
                }
                signer = await provider.getSigner();
                contract = new ethers.Contract(FORGE_CONFIG.address, ABI, provider);
                currentAccount = (await signer.getAddress()).toLowerCase();
                
                if (confirmedGuardians.has(currentAccount.toLowerCase())) {
                    btn.textContent = "✓ You are a Guardian";
                    btn.disabled = true;
                } else if (optimisticGuardians.has(currentAccount.toLowerCase())) {
                    btn.textContent = "⏳ Pending Confirmation";
                    btn.disabled = true;
                } else {
                    btn.textContent = "Register as Guardian";
                    btn.disabled = false;
                    btn.onclick = registerAsGuardian;
                }
                
                await syncForgeState();
                
            } catch (e) {
                console.error(e);
                btn.disabled = false;
                btn.textContent = "Connect Wallet";
            }
        }

        async function init() {
            // Load persisted state
            loadCursor();
            loadOptimistic();
            
            // Try passive provider
            if (window.ethereum) {
                provider = new ethers.BrowserProvider(window.ethereum);
                contract = new ethers.Contract(FORGE_CONFIG.address, ABI, provider);
                
                try {
                    const accounts = await provider.listAccounts();
                    if (accounts.length > 0) {
                        signer = await provider.getSigner();
                        currentAccount = (await signer.getAddress()).toLowerCase();
                    }
                } catch(e) {}
            }
            
            // Fetch manifest
            try {
                const manifest = await fetch('/FORGE_REGISTRY_MANIFEST.json').then(r => r.json());
                FORGE_CONFIG.address = manifest.contractAddress;
                FORGE_CONFIG.deploymentBlock = manifest.deploymentBlock;
                if (lastScannedBlock < FORGE_CONFIG.deploymentBlock) {
                    lastScannedBlock = FORGE_CONFIG.deploymentBlock;
                }
            } catch(e) {
                console.warn("Manifest not found, using defaults");
            }
            
            // Setup button
            document.getElementById('registerBtn').onclick = connectWallet;
            
            // Initial sync
            await syncForgeState();
            
            // Poll every 15s
            setInterval(syncForgeState, 15000);
            
            // Handle account changes
            if (window.ethereum) {
                window.ethereum.on('accountsChanged', () => window.location.reload());
            }
            
            updateUI();
        }

        // Start
        init();
    </script>
</body>
</html>
