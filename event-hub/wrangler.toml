name = "oinio-event-hub"
compatibility_date = "2026-03-01"
compatibility_flags = [ "nodejs_compat" ]

# Worker configuration
main = "worker.js"

[vars]
PUBLISH_TOKEN = "generate_your_secure_token_here"

[build]
command = ""

[env.production]
name = "oinio-event-hub-prod"

# Optional: KV namespace for persistent event logging
# [[kv_namespaces]]
# binding = "EVENT_LOG"
# id = ""

# Optional: Durable Object for ordered event streams
# [[durable_objects.bindings]]
# name = "EVENT_STREAM"
# class_name = "OrderedEventStream"