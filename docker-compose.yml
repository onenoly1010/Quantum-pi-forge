version: '3.9'
name: sovereign-resonance-agent

services:
  redis:
    image: redis:7-alpine
    container_name: oinio-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  resonance-worker:
    build: .
    container_name: oinio-resonance-worker
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./:/app
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: node workers/resonance-worker.js
    restart: unless-stopped

  # Optional: Embedded Ollama (uncomment to run fully contained)
