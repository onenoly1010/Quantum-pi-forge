name: Cloudflare Pages Build Check

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cloudflare-pages-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build static Pages output
        run: npm run build

      - name: Verify Pages artifacts
        run: |
          test -f out/index.html
          test -f out/_redirects
          echo "Cloudflare Pages artifacts verified."

