name: Canon Auto-Merge Pipeline

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled, review_requested, review_request_removed, submitted]
    paths:
      - 'canon/**'

concurrency:
  group: canon-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  checks: write
  issues: write

jobs:
  gate1-classification:
    name: Gate 1 - Classification
    runs-on: ubuntu-latest
    outputs:
      is_canon_pr: ${{ steps.classify.outputs.is_canon_pr }}
      artifact_type: ${{ steps.classify.outputs.artifact_type }}
      artifact_path: ${{ steps.classify.outputs.artifact_path }}
      artifact_id: ${{ steps.classify.outputs.artifact_id }}
      trace_id: ${{ steps.classify.outputs.trace_id }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Classify Canon PR
        id: classify
        run: |
          # Extract changed files in canon directory
          CHANGED_FILES=$(gh pr view ${{ github.event.pull_request.number }} --json files --jq '.files[].path' | grep '^canon/.*\.md$' | head -1)
          
          if [ -z "$CHANGED_FILES" ]; then
            echo "is_canon_pr=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "is_canon_pr=true" >> $GITHUB_OUTPUT
          echo "artifact_path=$CHANGED_FILES" >> $GITHUB_OUTPUT
          
          # Extract frontmatter
          if [ -f "$CHANGED_FILES" ]; then
            TYPE=$(grep -m1 '^type:' "$CHANGED_FILES" | cut -d' ' -f2 | tr -d '\r')
            ID=$(grep -m1 '^id:' "$CHANGED_FILES" | cut -d' ' -f2 | tr -d '\r')
            TRACE=$(grep -m1 '^trace_id:' "$CHANGED_FILES" | cut -d' ' -f2 | tr -d '\r')
            
            echo "artifact_type=$TYPE" >> $GITHUB_OUTPUT
            echo "artifact_id=$ID" >> $GITHUB_OUTPUT
            echo "trace_id=$TRACE" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  gate2-sentinel:
    name: Gate 2 - ClosureSentinel Validation
    needs: gate1-classification
    if: needs.gate1-classification.outputs.is_canon_pr == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Wait for ClosureSentinel check
        run: |
          echo "Waiting for ClosureSentinel validation..."
          # Sentinel check will be added by Probot app
          # Proceed after timeout with warning
          
  gate3-policy-evaluation:
    name: Gate 3 - Policy Engine Evaluation
    needs: [gate1-classification, gate2-sentinel]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Run Canon Policy Engine
        run: |
          ARTIFACT_TYPE="${{ needs.gate1-classification.outputs.artifact_type }}"
          PR_NUMBER=${{ github.event.pull_request.number }}
          
          # Get approved reviews count
          APPROVALS=$(gh pr view $PR_NUMBER --json reviews --jq '[.reviews[] | select(.state == "APPROVED")] | length')
          
          # Execute single source of truth policy evaluation
          python3 .github/scripts/policy_engine.py \
            --artifact-type "$ARTIFACT_TYPE" \
            --approvals "$APPROVALS" \
            --roles oinio_soul contributor curator steward \
            --gate2 \
            --gate4 \
            --lint \
            --pr "$PR_NUMBER" \
            --path "${{ needs.gate1-classification.outputs.artifact_path }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  gate4-conflict:
    name: Gate 4 - Conflict Detection
    needs: [gate1-classification, gate3-approval]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Check for conflicts
        run: |
          python .github/scripts/check-conflicts.py \
            --canon-dir canon \
            --new-artifact "${{ needs.gate1-classification.outputs.artifact_path }}"

  gate5-audit:
    name: Gate 5 - Audit Logging
    needs: [gate1-classification, gate4-conflict]
    runs-on: ubuntu-latest
    steps:
      - name: Add audit labels
        run: |
          gh pr edit ${{ github.event.pull_request.number }} \
            --add-label "auto-merged,audit-logged"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  gate6-atomic-verify:
    name: Gate 6 - Atomic State Verification
    needs: [gate1-classification, gate5-audit]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Final Atomic Policy Verification
        run: |
          ARTIFACT_PATH="${{ needs.gate1-classification.outputs.artifact_path }}"
          PR_NUMBER=${{ github.event.pull_request.number }}
          
          # FINAL VERIFICATION - this runs IMMEDIATELY before merge
          # No state changes can happen after this point
          
          # Get actual approvals from GitHub
          APPROVALS=$(gh pr view $PR_NUMBER --json reviews --jq '[.reviews[] | select(.state == "APPROVED")] | length')
          
          # Run policy engine AGAIN on EXACT current state
          echo "🔒 Performing final atomic verification..."
          echo
          
          RESULT=$(python3 .github/scripts/policy_engine.py \
            --artifact-type "${{ needs.gate1-classification.outputs.artifact_type }}" \
            --approvals "$APPROVALS" \
            --roles oinio_soul contributor curator steward \
            --gate2 \
            --gate4 \
            --lint \
            --pr "$PR_NUMBER" \
            --path "$ARTIFACT_PATH")
          
          EXIT_CODE=$?
          
          # Extract verified hash from trace
          TRACE_HASH=$(echo "$RESULT" | grep artifact_hash | awk '{print $2}')
          
          # Recompute hash directly from filesystem
          REAL_HASH=$(sha256sum "$ARTIFACT_PATH" | cut -d ' ' -f1 | cut -c1-16)
          
          echo
          echo "=== Atomic Verification ==="
          echo "Trace hash:  $TRACE_HASH"
          echo "Actual hash: $REAL_HASH"
          echo
          
          if [ "$TRACE_HASH" != "$REAL_HASH" ]; then
            echo "❌ STATE MISMATCH DETECTED"
            echo "Artifact changed between evaluation and merge"
            echo "Rejecting merge to prevent TOCTOU vulnerability"
            exit 1
          fi
          
          if [ $EXIT_CODE -ne 0 ]; then
            echo "❌ Final policy verification failed"
            echo "$RESULT"
            exit 1
          fi
          
          echo "✅ STATE VERIFIED - artifact unchanged since evaluation"
          echo "✅ POLICY VALID - merge authorized"
          
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  gate7-merge:
    name: Gate 7 - Execute Merge
    needs: [gate1-classification, gate6-atomic-verify]
    runs-on: ubuntu-latest
    steps:
      - name: Merge PR
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --squash \
            --delete-branch \
            --subject "Canon: Merge PR #${{ github.event.pull_request.number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
