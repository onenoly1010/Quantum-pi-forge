# Quantum Pi Forge Production Deployment Pipeline
# Implements 2026 Best Practices:
# - Railway Project Token (not account token)
# - Built-in GITHUB_TOKEN for GHCR (no PAT required)
# - Submodule sync with verification
# - Health checks before deployment
#
name: Production Deployment Pipeline

on:
  push:
    branches: [ main ]

# Minimum required permissions for this workflow
permissions:
  contents: read
  packages: write
  statuses: write
  checks: write

jobs:
  # ---------------------------------------------------------------------------
  # PRE-FLIGHT VALIDATION
  # ---------------------------------------------------------------------------
  preflight:
    name: Pre-flight Validation
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.sha }}
    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Sync and verify submodules
        run: |
          echo "🔄 Synchronizing git submodules..."
          git submodule sync --recursive
          git submodule update --init --recursive --force
          git submodule foreach --recursive git checkout main
          git submodule foreach --recursive git pull origin main
          
          echo "✅ Submodule status:"
          git submodule status
          
      - name: Set version tag
        id: version
        run: echo "sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

  # ---------------------------------------------------------------------------
  # BUILD AND PUSH TO GHCR
  # ---------------------------------------------------------------------------
  build-container:
    name: Build & Push Container
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ✅ USES BUILT-IN GITHUB_TOKEN - NO CUSTOM PAT REQUIRED
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ github.repository_owner }}/quantum-pi-forge:latest
            ghcr.io/${{ github.repository_owner }}/quantum-pi-forge:${{ needs.preflight.outputs.version }}

      - name: Container Summary
        run: |
          echo "## ✅ Container Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Image: ghcr.io/${{ github.repository_owner }}/quantum-pi-forge" >> $GITHUB_STEP_SUMMARY
          echo "- Tags: latest, ${{ needs.preflight.outputs.version }}" >> $GITHUB_STEP_SUMMARY

  # ---------------------------------------------------------------------------
  # DEPLOY TO RAILWAY
  # ---------------------------------------------------------------------------
  deploy-railway:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: [preflight, build-container]
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Railway CLI
        run: npm install -g @railway/cli@latest

      # ✅ USES RAILWAY PROJECT TOKEN (RECOMMENDED BEST PRACTICE)
      # This token should be created per-project in Railway Settings -> Tokens
      # NOT an account-level token
      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway login --token ${{ secrets.RAILWAY_TOKEN }}
          railway up --service=quantum-pi-forge --detach
          
          echo "## ✅ Deployment Initiated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Service: quantum-pi-forge" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ needs.preflight.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Railway Dashboard: https://railway.app/project/quantum-pi-forge" >> $GITHUB_STEP_SUMMARY

  # ---------------------------------------------------------------------------
  # POST DEPLOYMENT VERIFICATION
  # ---------------------------------------------------------------------------
  verify-deployment:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: deploy-railway
    steps:
      - name: Wait for deployment
        run: sleep 60

      - name: Run health check
        run: |
          echo "🔍 Verifying deployment health..."
          curl -f --retry 5 --retry-delay 10 https://api.quantumpiforge.com/health
          
          echo "## ✅ Deployment Verified" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Production deployment completed successfully!" >> $GITHUB_STEP_SUMMARY