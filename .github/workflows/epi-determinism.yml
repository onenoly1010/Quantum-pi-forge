name: EPI Determinism Proof

on:
  push:
    branches: [ main ]
  pull_request:
    paths:
      - 'EVIDENCE_BINDING_LAYER_EPI_v1.0_NORMALIZED.md'
      - 'scripts/**'
      - 'infra/repro/**'

jobs:
  prove-determinism:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build Fresh Hermetic Container
        run: docker build -t epi-proof:v1.5 -f infra/repro/Dockerfile .

      - name: Execute Pipeline & Capture Output
        run: |
          mkdir -p ./output
          docker run --rm \
            -v "$(pwd)/output:/forge/output" \
            epi-proof:v1.5 > manifest.log 2>&1
          cat manifest.log

      - name: Verify & Print Final SHA-256
        run: |
          echo "=== EPI Determinism Proof ==="
          cat manifest.log
          if [ -f ./output/EPI_v1.1_regenerated.json ]; then
            echo "Final Manifest SHA-256:"
            sha256sum ./output/EPI_v1.1_regenerated.json
            echo "✓ Pipeline produced deterministic output inside clean container"
          else
            echo "⚠ Artifact missing - check epi-reproduce.sh"
            exit 1
          fi

      - name: Upload Proof Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: epi-determinism-proof
          path: |
            manifest.log
            output/*